model:
  # ── Input ────────────────────────────────────────────────────────────────────
  in_channels: 4          # u100, v100, wind_speed_100, capacity
  n_cyclical_features: 4  # doy_sin, doy_cos, hod_sin, hod_cos

  # ── Conv blocks ──────────────────────────────────────────────────────────────
  conv_filters: [16, 32, 64]
  kernel_size: 3
  stride: 1
  padding: 1
  use_batch_norm: false
  activation: relu

  # ── Spatial pooling ───────────────────────────────────────────────────────────
  pooling: global_average

  # ── Dense head ───────────────────────────────────────────────────────────────
  dense_hidden: [128, 64]
  dropout: 0.4

  # ── Output mode ──────────────────────────────────────────────────────────────
  output_capacity_factor: false

training:
  learning_rate: 1.0e-3
  batch_size: 32
  max_epochs: 100
  optimizer: adam
  weight_decay: 1.0e-4
