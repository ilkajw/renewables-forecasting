model:
  # ── Input ────────────────────────────────────────────────────────────────────
  in_channels: 3          # ssrd, t2m, capacity
  n_cyclical_features: 4  # doy_sin, doy_cos, hod_sin, hod_cos

  # ── Conv blocks ──────────────────────────────────────────────────────────────
  conv_filters: [16, 32, 64]
  kernel_size: 3
  stride: 1
  padding: 1
  use_batch_norm: false
  activation: relu

  # ── Spatial pooling ───────────────────────────────────────────────────────────
  pooling: global_average

  # ── Dense head ───────────────────────────────────────────────────────────────
  dense_hidden: [128, 64]
  dropout: 0.2

  # ── Output mode ──────────────────────────────────────────────────────────────
  # false: unbounded scalar MWh output (options 1, 2, 4, 5)
  # true:  sigmoid output in [0,1] capacity factor (options 3, 4)
  #        multiply by total_capacity / 1000 in training loop to reconstruct MWh
  output_capacity_factor: false

training:
  learning_rate: 1.0e-3
  batch_size: 32
  max_epochs: 200
  optimizer: adam
  weight_decay: 0.0
  early_stopping_patience: 30

  # ── Loss weighting ────────────────────────────────────────────────────────────
  # Upweights high-generation hours to improve peak accuracy.
  # Strategies:
  #   none                 — standard unweighted MSE
  #   proportional         — weight = target / mean_train_target
  #   proportional_squared — weight = target² / mean(target²), more aggressive
  #   clipped              — proportional but capped at loss_weight_max
  #   threshold            — binary: above percentile gets multiplier, rest get 1.0
  loss_weighting: "none"
  loss_weight_max: 5.0                    # cap for clipped strategy
  loss_weight_threshold_percentile: 75.0  # percentile for threshold strategy
  loss_weight_threshold_multiplier: 3.0   # multiplier for threshold strategy
